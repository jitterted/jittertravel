<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Pending Commands</title>
    <link rel="stylesheet" href="/site.css"/>
    <style>
        .pending-container {
            max-width: 100ch;
            margin: 1.5rem auto;
            padding: 0 1rem;
        }

        h1 { margin-top: 1rem; font-size: 1.6rem; }

        .intro { color: var(--muted-text); margin: 0.5rem 0 1.25rem; }

        .flash {
            padding: 0.6rem 1rem;
            border-radius: 8px;
            background: #ecfdf5;
            border: 1px solid #10b981;
            color: #065f46;
            margin-bottom: 1rem;
        }

        .pending-card {
            border: 1px solid var(--border-color);
            border-left: 4px solid #6b7280;
            border-radius: 8px;
            margin-bottom: 1rem;
            background: var(--bg-color);
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
            overflow: hidden;
        }

        .pending-header {
            padding: 0.75rem 1rem;
            background: var(--header-bg);
            display: flex;
            align-items: baseline;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .command-type {
            font-weight: 600;
            font-family: ui-monospace, SFMono-Regular, monospace;
            font-size: 0.95rem;
        }

        .command-timestamp {
            color: var(--muted-text);
            font-size: 0.82rem;
            font-variant-numeric: tabular-nums;
        }

        .command-id {
            margin-left: auto;
            font-family: ui-monospace, SFMono-Regular, monospace;
            font-size: 0.72rem;
            color: var(--muted-text);
        }

        pre.payload {
            margin: 0;
            padding: 0.75rem 1rem;
            background: #0f172a;
            color: #e2e8f0;
            font-size: 0.8rem;
            overflow-x: auto;
            white-space: pre;
        }

        .actions {
            display: flex;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            border-top: 1px solid var(--border-color);
        }

        .actions form { margin: 0; }

        .actions button {
            padding: 0.45rem 0.9rem;
            border-radius: 6px;
            border: 1px solid transparent;
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-abandon {
            background: #c0392b;
            color: white;
        }

        .btn-abandon:hover { background: #a93226; }

        .btn-keep {
            background: transparent;
            color: var(--accent-color);
            border-color: var(--border-color) !important;
        }

        .btn-keep:hover { background: var(--header-bg); }
    </style>
</head>
<body>
<nav><h3><a href="/admin">Admin</a> &middot; <a href="/">JitterTravel</a></h3></nav>
<div class="pending-container">
    <h1>Pending Commands</h1>
    <p class="intro">
        These commands were persisted but never completed (no events were written). Review each
        payload, then <strong>Abandon</strong> it (mark resolved) or <strong>Keep as Pending</strong>.
    </p>

    <p th:if="${message}" class="flash" th:text="${message}">Done.</p>

    <p th:if="${commands.isEmpty()}" style="color: var(--muted-text); font-style: italic;">
        No pending commands. Everything has completed.
    </p>

    <article th:each="command : ${commands}" class="pending-card">
        <header class="pending-header">
            <span class="command-type" th:text="${command.simpleType()}">CommandType</span>
            <span class="command-timestamp"
                  th:text="${#temporals.format(command.timestamp(), 'yyyy-MM-dd HH:mm:ss.SSS z')}">ts</span>
            <span class="command-id" th:text="${command.commandId()}">command-uuid</span>
        </header>
        <pre class="payload" th:text="${command.payloadJson()}">{}</pre>
        <div class="actions">
            <form th:action="@{/admin/pending-commands/{id}/abandon(id=${command.commandId()})}" method="post">
                <button type="submit" class="btn-abandon">Abandon Command</button>
            </form>
            <form th:action="@{/admin/pending-commands/{id}/keep(id=${command.commandId()})}" method="post">
                <button type="submit" class="btn-keep">Keep as Pending</button>
            </form>
        </div>
    </article>
</div>
</body>
</html>
