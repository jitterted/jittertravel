<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Itinerary</title>
    <link rel="stylesheet" href="../static/site.css" th:href="@{/site.css}">
    <style>
        .page { max-width: 1200px; margin: 0 auto; padding: 1rem; }

        nav { margin-bottom: 1rem; font-size: 0.9rem; }
        nav a { color: var(--accent-color); text-decoration: none; }
        nav a:hover { text-decoration: underline; }
        nav .sep { color: var(--muted-text); margin: 0 0.4em; }

        h1 { margin: 0 0 0.75rem; font-size: 1.4rem; }

        .date-nav {
            display: flex;
            align-items: center;
            gap: 1.25rem;
            margin-bottom: 1.25rem;
            font-size: 0.95rem;
        }

        .date-nav a { color: var(--accent-color); text-decoration: none; font-weight: 600; }
        .date-nav a:hover { text-decoration: underline; }
        .date-range { font-weight: 500; color: var(--text-color); }

        .itinerary-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 1rem;
            align-items: start;
        }

        .day-header {
            font-weight: 700;
            font-size: 1rem;
            padding-bottom: 0.4rem;
            border-bottom: 2px solid var(--border-color);
            margin-bottom: 0.6rem;
            color: var(--text-color);
        }

        .empty-day { font-size: 0.85rem; color: var(--muted-text); font-style: italic; }

        .entry-card {
            border-left: 4px solid transparent;
            border-radius: 0 6px 6px 0;
            padding: 0.55rem 0.75rem;
            margin-bottom: 0.6rem;
        }

        .entry-card--conference { border-left-color: #4f46e5; background: #e0e7ff; }
        .entry-card--flight     { border-left-color: #075985; background: #cfeafd; }
        .entry-card--train      { border-left-color: #9a3412; background: #ffedd5; }
        .entry-card--lodging    { border-left-color: #166534; background: #dcfce7; }

        .entry-header {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            margin-bottom: 0.2rem;
        }

        .entry-header svg { width: 13px; height: 13px; flex-shrink: 0; }

        .entry-kind {
            font-size: 0.68rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .entry-kind--conference { color: #4f46e5; }
        .entry-kind--flight     { color: #075985; }
        .entry-kind--train      { color: #9a3412; }
        .entry-kind--lodging    { color: #166534; }

        .entry-title {
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 0.2rem;
            line-height: 1.3;
        }

        .entry-detail { font-size: 0.82rem; color: #374151; line-height: 1.4; }
        .entry-detail a { color: inherit; text-decoration: underline; }
        .entry-location { font-weight: 700; }
    </style>
</head>
<body>
<div class="page">

    <nav>
        <a href="/">JitterTravel</a>
        <span class="sep">·</span>
        <a href="/calendar">Calendar</a>
    </nav>

    <h1>Itinerary</h1>

    <div class="date-nav">
        <a th:href="@{/itinerary(date=${prevDate})}">← Previous</a>
        <span class="date-range"
              th:text="${#temporals.format(days[0].date(), 'MMM d') + ' – ' + #temporals.format(days[2].date(), 'MMM d, yyyy')}"></span>
        <a th:href="@{/itinerary(date=${nextDate})}">Next →</a>
    </div>

    <div class="itinerary-grid">
        <div th:each="day : ${days}">

            <div class="day-header" th:text="${#temporals.format(day.date(), 'EEE, MMM d')}"></div>

            <div th:if="${!day.hasEntries()}" class="empty-day">Nothing scheduled</div>

            <div th:each="entry : ${day.entries()}">

                <!-- Flight -->
                <div th:if="${entry.kind().name() == 'FLIGHT'}" class="entry-card entry-card--flight">
                    <div class="entry-header">
                        <svg viewBox="0 0 24 24" fill="none" stroke="#075985" stroke-width="1.8"
                             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M2 16l20-7-9 13-2-6-9 0z"/>
                        </svg>
                        <span class="entry-kind entry-kind--flight"
                              th:text="${entry.role().name() == 'ARRIVAL' ? 'Arriving' : 'Flight'}"></span>
                    </div>
                    <div class="entry-title"
                         th:text="${entry.airline() + ' ' + entry.flightNumber()}"></div>
                    <div class="entry-detail">
                        <strong th:text="${entry.departureAirportCode()}"></strong>
                        <span th:text="${' ' + #temporals.format(entry.departureDateTime(), 'h:mm a')}"></span>
                        &nbsp;→&nbsp;
                        <strong th:text="${entry.arrivalAirportCode()}"></strong>
                        <span th:text="${' ' + #temporals.format(entry.arrivalDateTime(), 'h:mm a')}"></span>
                    </div>
                </div>

                <!-- Train -->
                <div th:if="${entry.kind().name() == 'TRAIN'}" class="entry-card entry-card--train">
                    <div class="entry-header">
                        <svg viewBox="0 0 24 24" fill="none" stroke="#9a3412" stroke-width="1.8"
                             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <rect x="4" y="3" width="16" height="14" rx="3"/>
                            <path d="M4 11h16M8 3v8M16 3v8M7 17l-2 4M17 17l2 4"/>
                            <circle cx="8.5" cy="14.5" r="1" fill="#9a3412" stroke="none"/>
                            <circle cx="15.5" cy="14.5" r="1" fill="#9a3412" stroke="none"/>
                        </svg>
                        <span class="entry-kind entry-kind--train"
                              th:text="${entry.role().name() == 'ARRIVAL' ? 'Arriving' : 'Train'}"></span>
                    </div>
                    <div th:if="${!entry.serviceId().isEmpty()}"
                         class="entry-detail" th:text="${entry.serviceId()}"></div>
                    <div class="entry-detail">
                        <span th:text="${#temporals.format(entry.departureDateTime(), 'h:mm a')}"></span>
                        &nbsp;→&nbsp;
                        <span th:text="${#temporals.format(entry.arrivalDateTime(), 'h:mm a')}"></span>
                    </div>
                    <div class="entry-title">
                        <th:block th:if="${!entry.departureMapsUrl().isEmpty()}">
                            <a th:href="${entry.departureMapsUrl()}" target="_blank" rel="noopener"
                               th:text="${entry.departureStationName()}"></a>
                        </th:block>
                        <th:block th:unless="${!entry.departureMapsUrl().isEmpty()}"
                                  th:text="${entry.departureStationName()}"></th:block>
                        &nbsp;→&nbsp;
                        <th:block th:if="${!entry.arrivalMapsUrl().isEmpty()}">
                            <a th:href="${entry.arrivalMapsUrl()}" target="_blank" rel="noopener"
                               th:text="${entry.arrivalStationName()}"></a>
                        </th:block>
                        <th:block th:unless="${!entry.arrivalMapsUrl().isEmpty()}"
                                  th:text="${entry.arrivalStationName()}"></th:block>
                    </div>
                </div>

                <!-- Hotel -->
                <div th:if="${entry.kind().name() == 'LODGING'}" class="entry-card entry-card--lodging">
                    <div class="entry-header">
                        <svg viewBox="0 0 24 24" fill="none" stroke="#166534" stroke-width="1.8"
                             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M2 4v16M2 8h18a2 2 0 0 1 2 2v10M2 17h20"/>
                            <path d="M6 8a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2"/>
                        </svg>
                        <span class="entry-kind entry-kind--lodging"
                              th:text="${entry.dayRole().name() == 'CHECK_IN' ? 'Check-In' : 'Check-Out'}"></span>
                    </div>
                    <a class="entry-title" th:href="${entry.mapsUrl()}" target="_blank" rel="noopener"
                       th:text="${entry.hotelName()}"></a>
                    <div class="entry-detail" th:text="${entry.address().street()}"></div>
                    <div class="entry-detail entry-location"
                         th:text="${entry.address().city()
                             + (!entry.address().region().isEmpty() ? ', ' + entry.address().region() : '')
                             + ' ' + entry.address().postalCode()}"></div>
                    <div class="entry-detail entry-location" th:text="${entry.address().country()}"></div>
                    <div class="entry-detail"
                         th:text="${#temporals.format(entry.anchorDateTime(), 'h:mm a')}"></div>
                </div>

                <!-- Conference -->
                <div th:if="${entry.kind().name() == 'CONFERENCE'}" class="entry-card entry-card--conference">
                    <div class="entry-kind entry-kind--conference"
                         th:text="${entry.totalDays() > 1 ? 'Day ' + entry.dayNumber() + ' of ' + entry.totalDays() : 'Conference'}"></div>
                    <div class="entry-title" th:text="${entry.name()}"></div>
                    <div class="entry-detail" th:text="${entry.venueName()}"></div>
                    <div class="entry-detail entry-location"
                         th:text="${entry.venueAddress().city() + ', ' + entry.venueAddress().country()}"></div>
                </div>

            </div>
        </div>
    </div>

</div>
</body>
</html>
