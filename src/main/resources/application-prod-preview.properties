# Production-PREVIEW profile — run the *secured* production configuration locally.
# Activate with: SPRING_PROFILES_ACTIVE=prod-preview
#   ./mvnw spring-boot:run -Dspring-boot.run.profiles=prod-preview
#
# It is an explicit, opt-in profile, so it is NEVER active on Railway when no profile is set —
# production there still uses the real Postgres references and real TED_PASSWORD/FAMILY_PASSWORD.
# This file only fills in local stand-ins for those so the secured chain can start on your machine.
#
# Security: because this profile is NOT "local", it uses the secured form-login chain
# (SecurityConfig), exactly like production — so you can exercise login, CSRF, and anonymous
# redaction locally.

# Local Postgres (overrides the production PG* placeholders from application.properties).
# Started from compose.yml via spring-boot-docker-compose, or point at your own instance.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/jittertravel?sslmode=disable}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.docker.compose.enabled=true

# Local-only stand-in login credentials (NOT secrets). A real TED_PASSWORD / FAMILY_PASSWORD
# environment variable still wins over these (env has higher precedence than this file), so you
# can override them ad hoc without editing this file.
TED_PASSWORD=preview
FAMILY_PASSWORD=preview

logging.level.com.zaxxer.hikari=DEBUG
