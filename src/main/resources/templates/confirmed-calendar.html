<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Confirmed Calendar</title>
    <style>
        .calendar-container {
            max-width: 1200px;
            margin: 2rem auto;
            font-family: system-ui, -apple-system, sans-serif;
            border-left: 1px solid #dee2e6;
            border-top: 1px solid #dee2e6;
        }

        .calendar-header {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
        }

        .calendar-header div {
            text-align: center;
            font-weight: 600;
            background-color: #f8f9fa;
            border-bottom: 1px solid #dee2e6;
            border-right: 1px solid #dee2e6;
            padding: 12px 0;
            font-size: 0.9rem;
            color: #495057;
        }

        /* Each week is its own CSS grid with day-label row on top and lane sub-rows below. */
        .calendar-week {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            /* grid-template-rows is set inline per week based on the number of populated lane sub-rows */
            background-color: #ffffff;
        }

        /* Day-label row (top row of every week) */
        .day-label-cell {
            grid-row: 1;
            border-top: 1px solid darkgray;
            border-bottom: 1px solid #dee2e6;
            border-right: 1px solid #dee2e6;
            min-height: 40px;
            padding: 6px 8px;
            background-color: #ffffff;
            box-sizing: border-box;
        }

        .day-label-cell.month-tint-even { background-color: #faf7f7; }
        .day-label-cell.month-tint-odd  { background-color: #ffffff; }

        /* Month-start L-border on day-label cells only */
        .day-label-cell.is-month-start {
            border-top: 3px solid #b45309;
            border-left: 3px solid #b45309;
        }

        .day-number {
            font-size: 0.9rem;
            font-weight: 500;
            color: #495057;
            text-align: left;
        }

        .day-number.is-month-start {
            font-size: 1.25rem;
            font-weight: 700;
            color: #b45309;
            letter-spacing: 0.02em;
        }

        /* Filler cell behind a lane sub-row: extends day-column borders and month
           tint down through the week. Only vertical day separators here — no
           horizontal borders between swimlanes. */
        .lane-cell {
            border-right: 1px solid #dee2e6;
            min-height: 64px;
            box-sizing: border-box;
        }

        /* The last lane sub-row of the week closes the bottom border. Easiest to
           just apply border-bottom to ALL day-label-cells and a CSS rule that the
           bottom-most lane-cells get it too — handled via the week's outer border. */
        .lane-cell.month-tint-even { background-color: #faf7f0; }
        .lane-cell.month-tint-odd  { background-color: #ffffff; }

        /* Lane entry segment: rounded colored block with a small margin so the
           background day-tint shows around it. */
        .entry {
            margin: 4px 6px;
            padding: 6px 10px;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 0.9rem;
            line-height: 1.3;
            min-height: 52px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .entry-title {
            font-weight: 700;
            font-size: 0.95rem;
            letter-spacing: 0.01em;
        }

        .entry-subtitle {
            font-size: 0.8rem;
            font-weight: 500;
            opacity: 0.95;
            margin-top: 2px;
        }

        /* Per-kind colors */
        .entry--conference {
            background-color: #e0e7ff;
            color: #4f46e5;
        }
        .entry--meetup {
            background-color: #fef3c7;
            color: #92400e;
        }
        .entry--flight {
            background-color: #cfeafd;
            color: #075985;
        }
        .entry--lodging {
            background-color: #dcfce7;
            color: #166534;
        }

        /* Continuation segments: slight transparency hint that more came before */
        .entry--continuation {
            opacity: 0.9;
        }
    </style>
</head>
<body>
<div th:utext="${calendarMarkup}"></div>
</body>
</html>
