<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Plan Gathering</title>
    <link rel="stylesheet" href="../static/site.css" th:href="@{/site.css}">
    <style>
        .page {
            max-width: 560px;
            margin: 0 auto;
            padding: 1rem;
        }

        nav { margin-bottom: 1rem; font-size: 0.9rem; }
        nav a { color: var(--accent-color); text-decoration: none; }
        nav a:hover { text-decoration: underline; }
        nav .sep { color: var(--muted-text); margin: 0 0.4em; }

        h1 { margin: 0 0 1rem; font-size: 1.4rem; }

        fieldset {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            margin-bottom: 0.75rem;
        }

        legend {
            font-weight: 600;
            padding: 0 0.4em;
            color: var(--muted-text);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .field { margin-bottom: 0.5rem; }
        .field:last-child { margin-bottom: 0; }

        .field label {
            display: flex;
            flex-direction: column;
            gap: 2px;
            font-size: 0.8rem;
            color: var(--muted-text);
        }

        .paste-row {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
            align-items: flex-end;
        }

        .paste-row textarea {
            flex: 1;
            padding: 0.3rem 0.5rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            font-size: 0.85rem;
            font-family: inherit;
            resize: vertical;
            min-height: 3.5rem;
            box-sizing: border-box;
        }

        .paste-row textarea:focus {
            outline: 2px solid var(--accent-color);
            outline-offset: 1px;
            border-color: transparent;
        }

        .parse-btn {
            background: var(--accent-color);
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 0.35rem 0.9rem;
            font-size: 0.85rem;
            font-family: inherit;
            cursor: pointer;
            white-space: nowrap;
        }

        .parse-btn:hover { opacity: 0.88; }

        .hint {
            font-size: 0.75rem;
            color: var(--muted-text);
            margin-top: 2px;
        }

        .field input[type=text],
        .field input[type=date],
        .field input[type=time] {
            padding: 0.3rem 0.5rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            font-size: 0.9rem;
            font-family: inherit;
            width: 100%;
            box-sizing: border-box;
        }

        .field input:focus {
            outline: 2px solid var(--accent-color);
            outline-offset: 1px;
            border-color: transparent;
        }

        .field-row {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .field-row .field { flex: 1; margin-bottom: 0; }

        .error {
            display: block;
            margin-top: 2px;
            font-size: 0.8rem;
            color: #b00;
        }

        .speaking-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
            font-size: 0.9rem;
        }

        .speaking-group label {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            cursor: pointer;
            color: var(--text-color);
        }

        button[type=submit] {
            background: var(--accent-color);
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 0.45rem 1.4rem;
            font-size: 0.95rem;
            font-family: inherit;
            cursor: pointer;
        }

        button[type=submit]:hover { opacity: 0.88; }
    </style>
</head>
<body>
<div class="page">

    <nav>
        <a href="/">JitterTravel</a>
        <span class="sep">·</span>
        <a href="/calendar">Calendar</a>
    </nav>

    <h1>Plan Gathering</h1>

    <form th:action="@{/plan-gathering}" th:object="${planGathering}" method="post">
        <input type="hidden" th:field="*{gatheringId}"/>

        <div class="field" style="margin-bottom: 0.5rem;">
            <label>
                Title
                <input type="text" th:field="*{title}"/>
            </label>
        </div>

        <div class="field" style="margin-bottom: 0.75rem;">
            <label>
                Venue Name
                <input type="text" th:field="*{venueName}"/>
            </label>
        </div>

        <fieldset>
            <legend>Venue</legend>

            <div class="paste-row">
                <textarea id="rawAddress" placeholder="Paste full address here to auto-fill fields below…"></textarea>
                <button type="button" class="parse-btn" id="parseBtn">Parse ▶</button>
            </div>

            <div class="field">
                <label>
                    Street
                    <input type="text" th:field="*{street}"/>
                </label>
            </div>
            <div class="field-row">
                <div class="field">
                    <label>
                        City
                        <input type="text" th:field="*{city}"/>
                    </label>
                </div>
                <div class="field">
                    <label>
                        Region
                        <input type="text" th:field="*{region}"/>
                    </label>
                </div>
            </div>
            <div class="field-row">
                <div class="field">
                    <label>
                        Country
                        <input type="text" th:field="*{country}"/>
                    </label>
                </div>
                <div class="field">
                    <label>
                        Postal Code
                        <input type="text" th:field="*{postalCode}"/>
                    </label>
                </div>
            </div>
            <div class="field">
                <label>
                    Location for matching
                    <input type="text" th:field="*{locationForMatching}"/>
                </label>
                <span class="hint">City name used to match with conferences and travel — edit if auto-fill picks the wrong level</span>
            </div>
        </fieldset>

        <div class="field-row" style="margin-bottom: 0.75rem;">
            <div class="field">
                <label>
                    Date
                    <input type="date" th:field="*{date}"/>
                </label>
                <span class="error"
                      th:if="${#fields.hasErrors('date')}"
                      th:errors="*{date}"></span>
            </div>
            <div class="field">
                <label>
                    Start time
                    <input type="time" th:field="*{startTime}"/>
                </label>
            </div>
            <div class="field">
                <label>
                    End time
                    <input type="time" th:field="*{endTime}"/>
                </label>
                <span class="error"
                      th:if="${#fields.hasErrors('endTime')}"
                      th:errors="*{endTime}"></span>
            </div>
        </div>

        <div class="speaking-group">
            <label>
                <input type="checkbox" th:field="*{speaking}"/>
                I'm speaking at this gathering
            </label>
        </div>

        <div class="field" style="margin-bottom: 0.75rem;">
            <label>
                Event page URL (optional)
                <input type="text" th:field="*{infoUrl}" placeholder="https://…"/>
            </label>
            <span class="hint">Link to the specific event page for this gathering</span>
        </div>

        <button type="submit">Plan Gathering</button>
    </form>

</div>
<script>
    document.getElementById('parseBtn').addEventListener('click', async () => {
        const raw = document.getElementById('rawAddress').value.trim();
        if (!raw) return;
        const btn = document.getElementById('parseBtn');
        btn.textContent = '…';
        btn.disabled = true;
        try {
            const resp = await fetch('/api/parse-address', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({rawAddress: raw})
            });
            if (!resp.ok) { btn.textContent = 'Not found'; return; }
            const d = await resp.json();
            const set = (name, val) => { if (val) { const el = document.querySelector('[name="' + name + '"]'); if (el) el.value = val; } };
            set('street', d.street);
            set('city', d.city);
            set('region', d.region);
            set('country', d.country);
            set('postalCode', d.postalCode);
            set('locationForMatching', d.locationForMatching || d.city);
        } catch (e) {
            btn.textContent = 'Error';
        } finally {
            setTimeout(() => { btn.textContent = 'Parse ▶'; btn.disabled = false; }, 1500);
        }
    });
</script>
</body>
</html>
