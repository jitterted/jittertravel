<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Schedule Problems</title>
    <link rel="stylesheet" href="../static/site.css" th:href="@{/site.css}">
    <style>
        .page { max-width: 1100px; margin: 0 auto; padding: 1rem; }

        nav { margin-bottom: 1rem; font-size: 0.9rem; }
        nav a { color: var(--accent-color); text-decoration: none; }
        nav a:hover { text-decoration: underline; }
        nav .sep { color: var(--muted-text); margin: 0 0.4em; }

        h1 { margin: 0 0 1.25rem; font-size: 1.4rem; }

        .no-problems {
            color: var(--muted-text);
            font-style: italic;
            font-size: 0.95rem;
            padding: 2rem 0;
        }

        .problem-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            align-items: start;
        }

        .column-heading {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin: 0 0 0.6rem;
        }

        .column-heading--travel { color: #92400e; }
        .column-heading--hotel  { color: #1e40af; }

        .problem-list {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .problem-card {
            border-left: 4px solid transparent;
            border-radius: 0 6px 6px 0;
            padding: 0.6rem 0.85rem;
        }

        .problem-card--missing-travel {
            border-left-color: #b45309;
            background: #fef3c7;
        }

        .problem-card--missing-hotel {
            border-left-color: #1d4ed8;
            background: #dbeafe;
        }

        .problem-title {
            font-weight: 600;
            font-size: 0.9rem;
            color: #1f2937;
        }

        .problem-detail {
            font-size: 0.82rem;
            color: #374151;
            margin-top: 0.15rem;
        }

        .empty-column {
            color: var(--muted-text);
            font-style: italic;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
<div class="page">

    <nav>
        <a href="/">JitterTravel</a>
        <span class="sep">·</span>
        <a href="/calendar">Calendar</a>
    </nav>

    <h1>Schedule Problems</h1>

    <div th:if="${travelProblems.isEmpty() and hotelProblems.isEmpty()}" class="no-problems">
        No problems found — your schedule looks complete.
    </div>

    <div th:unless="${travelProblems.isEmpty() and hotelProblems.isEmpty()}" class="problem-columns">

        <!-- Left column: Missing Travel -->
        <div>
            <p class="column-heading column-heading--travel">Missing Travel</p>
            <div class="problem-list" th:unless="${travelProblems.isEmpty()}">
                <div th:each="p : ${travelProblems}" class="problem-card problem-card--missing-travel">
                    <div class="problem-title"
                         th:text="${p.fromCity() + ' → ' + p.toCity()}"></div>
                    <div class="problem-detail"
                         th:text="${'Arrive ' + #temporals.format(p.arrivedAt(), 'MMM d, h:mm a')
                                   + ' — next leg departs ' + #temporals.format(p.nextDepartureAt(), 'MMM d, h:mm a')}"></div>
                </div>
            </div>
            <p th:if="${travelProblems.isEmpty()}" class="empty-column">None</p>
        </div>

        <!-- Right column: Missing Hotel -->
        <div>
            <p class="column-heading column-heading--hotel">Missing Hotel</p>
            <div class="problem-list" th:unless="${hotelProblems.isEmpty()}">
                <div th:each="p : ${hotelProblems}" class="problem-card problem-card--missing-hotel">
                    <div class="problem-title">
                        <span th:text="${p.city()}"></span><span
                            th:if="${!p.conferenceName().isEmpty()}"
                            th:text="${' — for ' + p.conferenceName()}"></span>
                    </div>
                    <div class="problem-detail"
                         th:text="${'No hotel covering checking in on '
                                   + #temporals.format(p.checkIn(), 'EEE, MMM d')
                                   + ' through check out on '
                                   + #temporals.format(p.checkOut(), 'EEE, MMM d')}"></div>
                </div>
            </div>
            <p th:if="${hotelProblems.isEmpty()}" class="empty-column">None</p>
        </div>

    </div>

</div>
</body>
</html>
