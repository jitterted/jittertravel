spring.application.name=JitterTravel
management.endpoints.web.exposure.include=health,metrics
spring.sql.init.mode=always

# Production datasource (default). These variables are NOT auto-injected: on Railway they live on
# the Postgres service, so the app service must reference them in its own variables (the password
# is referenced this way too, never typed by hand):
#   PGDATABASE="${{Postgres.PGDATABASE}}"
#   PGHOST="${{Postgres.PGHOST}}"
#   PGPASSWORD="${{Postgres.PGPASSWORD}}"
#   PGPORT="${{Postgres.PGPORT}}"
#   PGUSER="${{Postgres.PGUSER}}"
# Local development overrides these in application-local.properties (profile: local).
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.pool-name=JitterTravelHikari
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=300000

# Production runs behind Railway: bind to the injected PORT and never start docker-compose.
server.port=${PORT:8080}
spring.docker.compose.enabled=false

# AeroDataBox flight lookup API (RapidAPI). Optional: if AERODATABOX_API_KEY is unset the app
# still starts but flight lookups are non-functional.
jittertravel.aerodatabox.api-key=${AERODATABOX_API_KEY:}
jittertravel.aerodatabox.base-url=https://aerodatabox.p.rapidapi.com
jittertravel.aerodatabox.host=aerodatabox.p.rapidapi.com
