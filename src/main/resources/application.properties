spring.application.name=JitterTravel
management.endpoints.web.exposure.include=health,metrics
spring.sql.init.mode=always
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/jittertravel?sslmode=disable}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.pool-name=JitterTravelHikari
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=300000
logging.level.com.zaxxer.hikari=DEBUG

# AeroDataBox flight lookup API (RapidAPI). Set AERODATABOX_API_KEY (e.g., via
# ~/.config/spring-boot/spring-boot-devtools.properties or shell env).
jittertravel.aerodatabox.api-key=${AERODATABOX_API_KEY:}
jittertravel.aerodatabox.base-url=https://aerodatabox.p.rapidapi.com
jittertravel.aerodatabox.host=aerodatabox.p.rapidapi.com