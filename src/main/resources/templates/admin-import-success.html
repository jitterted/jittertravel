<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Import Complete — Admin — JitterTravel</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #faf9f7;
            --surface: #ffffff;
            --text-primary: #1a1916;
            --text-secondary: #6b6860;
            --text-muted: #b0aea8;
            --border: rgba(0, 0, 0, 0.10);
            --success: #1a7a3f;
            --success-bg: #f0faf4;
            --success-border: #b2dfc4;
            --radius: 10px;
        }

        body {
            font-family: ui-sans-serif, system-ui, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: var(--success-bg);
            border: 1px solid var(--success-border);
            border-radius: var(--radius);
            padding: 2.5rem 3rem;
            text-align: center;
            max-width: 40ch;
        }

        .checkmark {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--success);
            margin-bottom: 0.5rem;
        }

        p {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 1.75rem;
        }

        .links {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            text-decoration: none;
            padding: 0.5rem 1.25rem;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .btn-primary {
            background: var(--success);
            color: #fff;
        }

        .btn-secondary {
            background: var(--surface);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }
    </style>
</head>
<body>

<div class="card">
    <div class="checkmark">✓</div>
    <h1>Import complete</h1>
    <p th:text="'Successfully imported ' + ${importedCount} + ' command' + (${importedCount} != 1 ? 's' : '') + '.'"></p>
    <div class="links">
        <a class="btn btn-primary" href="/admin/commandlog">View command log</a>
        <a class="btn btn-secondary" href="/admin">Admin</a>
    </div>
</div>

</body>
</html>
