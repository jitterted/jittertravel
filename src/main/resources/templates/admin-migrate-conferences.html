<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Migrate Conferences — Admin</title>
    <link rel="stylesheet" href="../static/site.css" th:href="@{/site.css}">
    <style>
        .page { max-width: 760px; margin: 0 auto; padding: 1rem; }
        nav { margin-bottom: 1rem; font-size: 0.9rem; }
        nav a { color: var(--accent-color); text-decoration: none; }
        nav a:hover { text-decoration: underline; }
        nav .sep { color: var(--muted-text); margin: 0 0.4em; }
        h1 { margin: 0 0 0.4rem; font-size: 1.4rem; }
        .subtitle { font-size: 0.875rem; color: var(--muted-text); margin-bottom: 1.25rem; }

        .error {
            background: #fee2e2;
            border-left: 4px solid #dc2626;
            border-radius: 0 6px 6px 0;
            padding: 0.6rem 0.85rem;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            color: #7f1d1d;
        }

        .empty { color: var(--muted-text); font-style: italic; font-size: 0.95rem; padding: 2rem 0; }

        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th {
            text-align: left;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted-text);
            padding: 0.4rem 0.6rem;
            border-bottom: 1px solid var(--border-color);
        }
        td { padding: 0.55rem 0.6rem; border-bottom: 1px solid var(--border-color); vertical-align: middle; }
        tr:last-child td { border-bottom: none; }

        button[type=submit] {
            background: var(--accent-color);
            color: #fff;
            border: none;
            border-radius: 5px;
            padding: 0.3rem 0.8rem;
            font-size: 0.82rem;
            font-family: inherit;
            cursor: pointer;
            white-space: nowrap;
        }
        button[type=submit]:hover { opacity: 0.88; }
    </style>
</head>
<body>
<div class="page">

    <nav>
        <a href="/admin">Admin</a>
        <span class="sep">·</span>
        Migrate Conferences
    </nav>

    <h1>Migrate Conferences to Gatherings</h1>
    <p class="subtitle">
        Converts a single-day tentative conference to a gathering, cancelling the conference entry.
    </p>

    <div class="error" th:if="${error}" th:text="${error}"></div>

    <p class="empty" th:if="${conferences.isEmpty()}">No tentative conferences to migrate.</p>

    <table th:unless="${conferences.isEmpty()}">
        <thead>
        <tr>
            <th>Name</th>
            <th>Date</th>
            <th>City</th>
            <th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="conf : ${conferences}">
            <td th:text="${conf.name()}"></td>
            <td th:text="${#temporals.format(conf.startDate(), 'EEE, MMM d, yyyy')}"></td>
            <td th:text="${conf.city() + ', ' + conf.country()}"></td>
            <td>
                <form th:action="@{/admin/migrate-conferences}" method="post">
                    <input type="hidden" name="conferenceId" th:value="${conf.conferenceId().id()}"/>
                    <button type="submit">Convert to Gathering</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

</div>
</body>
</html>
