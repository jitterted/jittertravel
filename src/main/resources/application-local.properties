# Local development profile — opt in with: SPRING_PROFILES_ACTIVE=local
# (e.g. ./mvnw spring-boot:run -Dspring-boot.run.profiles=local)
#
# This profile activates the permissive, no-auth security chain (see SecurityConfig) and a
# local Postgres. Production is the DEFAULT (secured) configuration; you must explicitly
# choose `local` for development.

# Local Postgres. spring-boot-docker-compose can start it from compose.yml, otherwise these
# defaults point at a locally running instance.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/jittertravel?sslmode=disable}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

# Allow docker-compose lifecycle locally (auto-skipped during tests).
spring.docker.compose.enabled=true

logging.level.com.zaxxer.hikari=DEBUG
